# Video Streaming System - Nginx Configuration
# Place this in: /etc/nginx/sites-available/video-streaming
# Then: sudo ln -s /etc/nginx/sites-available/video-streaming /etc/nginx/sites-enabled/

# HTTP Server
server {
    listen 80;
    listen [::]:80;
    
    server_name your-domain.com www.your-domain.com;
    
    # Redirect to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # Client max body size (for any uploads in future)
    client_max_body_size 100M;

    # Frontend static files (React build)
    location / {
        root /home/user/video-streaming-system/frontend/build;
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Don't cache index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Backend API - Streaming endpoint
    location /stream {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        
        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CRITICAL: Disable buffering for streaming
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for large file streaming
        proxy_read_timeout 3600s;
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Keep alive
        proxy_socket_keepalive on;
        
        # Large body support
        client_body_timeout 3600s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Access logs
    access_log /var/log/nginx/video-streaming-access.log;
    error_log /var/log/nginx/video-streaming-error.log;
}

